# Pages — publishes the site to GitHub Pages after CI succeeds on main.
#
# Runs ALONGSIDE the AWS deploy (deploy.yml). Pages serves from the custom
# domain https://samukelo.mkhonza.net/ (Settings → Pages), so both targets
# serve from the root path. PUBLIC_URL is pinned to / to keep that explicit;
# package.json deliberately has NO "homepage" field.
#
# This workflow skips itself until the PAGES_ENABLED repository variable is
# set to 'true' (after you enable Pages in Settings → Pages → Source:
# "GitHub Actions"). See .github/DEPLOYMENT.md for the full checklist —
# including that Pages on a private repo requires a paid plan.

name: Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      # deploy to Pages
  id-token: write   # verify the deployment originates from this workflow

# One Pages deploy at a time; never cancel one mid-flight.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Run only if CI succeeded (or this is a manual dispatch), and only once
    # Pages has been enabled in the repo settings.
    if: >-
      vars.PAGES_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    steps:
      # For workflow_run events, check out the exact commit CI validated.
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node 20 with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # The custom domain samukelo.mkhonza.net serves from the root, so
      # assets must be root-relative (the old github.io URL redirects there).
      - name: Build for GitHub Pages
        run: npm run build
        env:
          CI: true
          PUBLIC_URL: /
          REACT_APP_EMAILJS_SERVICE_ID: ${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}
          REACT_APP_EMAILJS_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_TEMPLATE_ID }}
          REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID }}
          REACT_APP_EMAILJS_PUBLIC_KEY: ${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
